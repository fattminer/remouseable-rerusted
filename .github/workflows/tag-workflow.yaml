name: Build Release Binaries

on:
  release:
    types:
      - published
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: remouseable-linux-x86_64
            binary: target/release/remouseable
          - os: windows-latest
            artifact: remouseable-windows-x86_64.exe
            binary: target/release/remouseable.exe
          - os: macos-latest
            artifact: remouseable-macos
            binary: target/release/remouseable
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Build Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libx11-dev libxcb1-dev libxrandr-dev
      - name: Build Release Binary
        run: cargo build --release --locked
      - name: Stage Release Binary
        shell: bash
        run: cp "${{ matrix.binary }}" "${{ matrix.artifact }}"
      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
      - name: Upload Published Release Asset
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.artifact }}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

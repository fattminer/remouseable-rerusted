name: Pull Request Checks

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch: {}

jobs:
  checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Linux Build Dependencies
        run: sudo apt-get update && sudo apt-get install --yes libx11-dev libxcb1-dev libxrandr-dev
      - name: Format
        run: cargo fmt --check
      - name: Test
        run: cargo test --all-targets
      - name: Lint
        run: cargo clippy --all-targets -- -D warnings
      - name: Documentation Tests
        run: cargo test --doc

  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Build Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libx11-dev libxcb1-dev libxrandr-dev
      - name: Build Release Binary
        run: cargo build --release --locked
